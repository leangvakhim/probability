<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditional Probability</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transitions for the SVG elements */
        .svg-animate {
            transition: all 0.6s ease-in-out;
        }

        /* Math fraction styling */
        .fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            margin: 0 0.5rem;
        }

        .numerator {
            border-bottom: 2px solid currentColor;
            padding: 0 0.25rem;
        }

        .denominator {
            padding: 0 0.25rem;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen font-sans text-gray-800 flex items-center justify-center p-4">

    <main class="max-w-6xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">

        <!-- Left Column: Visualization Area -->
        <div
            class="w-full md:w-3/5 bg-gray-100 p-6 flex flex-col relative border-b md:border-b-0 md:border-r border-gray-200">
            <h2 class="text-xl font-bold text-gray-700 mb-4 text-center">The Pizza Customer Analysis</h2>

            <div class="flex-grow flex items-center justify-center min-h-[350px]">
                <svg viewBox="0 0 500 350" class="w-full h-full max-h-[400px]">
                    <!-- Definitions for intersection clipping -->
                    <defs>
                        <clipPath id="circle-a-clip">
                            <circle cx="190" cy="180" r="110" />
                        </clipPath>
                    </defs>

                    <!-- Universe -->
                    <g id="universe-group" class="svg-animate">
                        <rect x="10" y="10" width="480" height="330" rx="12" fill="#ffffff" stroke="#cbd5e1"
                            stroke-width="3" />
                        <text x="25" y="35" class="text-sm font-bold fill-gray-500">Universe (Ω): 100 Customers</text>
                    </g>

                    <!-- Set A (Pepperoni) -->
                    <g id="circle-a-group" class="svg-animate">
                        <circle cx="190" cy="180" r="110" fill="rgba(239, 68, 68, 0.3)" stroke="#ef4444"
                            stroke-width="2" />
                        <text id="label-a" x="110" y="170"
                            class="text-base font-bold fill-red-700 svg-animate text-center">
                            <tspan x="110" dy="0">Pepperoni</tspan>
                            <tspan x="110" dy="20">Event A (60)</tspan>
                        </text>
                    </g>

                    <!-- Set B (Mushrooms) -->
                    <g id="circle-b-group" class="svg-animate">
                        <circle cx="310" cy="180" r="110" fill="rgba(59, 130, 246, 0.3)" stroke="#3b82f6"
                            stroke-width="2" />
                        <text id="label-b" x="390" y="170" text-anchor="middle"
                            class="text-base font-bold fill-blue-700 svg-animate">
                            <tspan x="390" dy="0">Mushrooms</tspan>
                            <tspan x="390" dy="20">Event B (40)</tspan>
                        </text>
                    </g>

                    <!-- Intersection (A ∩ B) -->
                    <g id="intersection-group" class="svg-animate" opacity="0">
                        <circle cx="310" cy="180" r="110" fill="rgba(168, 85, 247, 0.7)"
                            clip-path="url(#circle-a-clip)" />
                        <text id="label-intersect" x="250" y="180" text-anchor="middle"
                            class="text-sm font-bold fill-white svg-animate">
                            <tspan x="250" dy="0">Both (A ∩ B)</tspan>
                            <tspan x="250" dy="20">20</tspan>
                        </text>
                    </g>

                    <!-- Focus Overlay (Used for restricting sample space) -->
                    <rect id="focus-overlay" x="0" y="0" width="500" height="350" fill="#f3f4f6" opacity="0"
                        class="svg-animate pointer-events-none" />
                </svg>
            </div>

            <!-- Visual Legend -->
            <div class="flex justify-center space-x-4 mt-4 text-xs font-semibold text-gray-600">
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-red-400 opacity-70 mr-2"></span>
                    Pepperoni</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-blue-400 opacity-70 mr-2"></span>
                    Mushrooms</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-purple-500 mr-2"></span> Both</div>
            </div>
        </div>

        <!-- Right Column: Text & Controls -->
        <div class="w-full md:w-2/5 p-8 flex flex-col justify-between">

            <!-- Step Indicators -->
            <div class="flex space-x-2 mb-6" id="step-indicators">
                <!-- Dots injected via JS -->
            </div>

            <!-- Content Area -->
            <div class="flex-grow">
                <h3 id="step-title" class="text-2xl font-extrabold text-gray-800 mb-3 transition-opacity duration-300">
                    Title</h3>
                <div id="step-description"
                    class="text-gray-600 leading-relaxed space-y-3 transition-opacity duration-300">
                    <!-- Text injected via JS -->
                </div>

                <div id="step-math"
                    class="mt-6 p-4 bg-indigo-50 rounded-xl border border-indigo-100 text-indigo-900 font-semibold text-md flex items-center justify-center transition-opacity duration-300 min-h-[80px]">
                    <!-- Math injected via JS -->
                </div>
            </div>

            <!-- Navigation Controls -->
            <div class="flex justify-between items-center mt-8 pt-4 border-t border-gray-100">
                <button id="btn-prev"
                    class="px-5 py-2.5 rounded-lg font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition disabled:opacity-30 disabled:cursor-not-allowed">
                    ← Previous
                </button>
                <div class="text-sm font-bold text-gray-400 tracking-wider"><span id="step-counter">1</span> / 6</div>
                <button id="btn-next"
                    class="px-5 py-2.5 rounded-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-md transition disabled:opacity-30 disabled:cursor-not-allowed">
                    Next →
                </button>
            </div>
        </div>
    </main>

    <script src="../js/cond_prob.js"></script>
</body>

</html>
