<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Independent vs Dependent Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .marble-red {
            @apply w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-gradient-to-br from-red-400 to-red-600 shadow-md border border-red-700 flex-shrink-0;
        }

        .marble-blue {
            @apply w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 shadow-md border border-blue-700 flex-shrink-0;
        }

        .marble-faded {
            @apply opacity-30 grayscale;
        }

        .jar {
            @apply p-4 bg-slate-100 rounded-b-2xl rounded-t-sm border-x-4 border-b-4 border-slate-300 min-w-[120px] sm:min-w-[150px] flex flex-wrap justify-center gap-2 items-end min-h-[100px] shadow-inner relative;
        }

        .jar::before {
            content: '';
            @apply absolute -top-2 left-0 right-0 h-2 bg-slate-200 border-x-4 border-t-4 border-slate-300 rounded-t-xl;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col min-h-[600px]">

        <!-- Header & Progress -->
        <div class="bg-indigo-600 text-white p-6">
            <h1 class="text-2xl sm:text-3xl font-bold mb-4">Probability: Independent vs. Dependent Events</h1>
            <div class="flex justify-between items-center gap-2" id="progress-container">
                <!-- Dots will be generated here by JS -->
            </div>
        </div>

        <!-- Dynamic Content Area -->
        <div class="flex-grow p-6 sm:p-8 flex flex-col justify-center transition-all duration-300" id="content-area">

            <div class="mb-6">
                <span id="step-badge"
                    class="inline-block px-3 py-1 bg-indigo-100 text-indigo-800 rounded-full text-sm font-semibold mb-3 tracking-wide uppercase"></span>
                <h2 id="step-title" class="text-2xl sm:text-3xl font-extrabold text-slate-800 mb-4"></h2>
                <p id="step-desc" class="text-lg text-slate-600 leading-relaxed"></p>
            </div>

            <!-- Visualization Container -->
            <div id="visual-container"
                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 sm:p-8 mt-4 flex-grow flex flex-col justify-center items-center text-center">
                <!-- Visuals injected by JS -->
            </div>

        </div>

        <!-- Navigation Footer -->
        <div class="bg-slate-100 p-4 sm:p-6 border-t border-slate-200 flex justify-between items-center">
            <button id="prev-btn"
                class="px-6 py-2.5 rounded-lg font-semibold text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 hover:text-indigo-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                ← Previous
            </button>
            <span id="step-counter" class="text-sm font-medium text-slate-500"></span>
            <button id="next-btn"
                class="px-6 py-2.5 rounded-lg font-semibold text-white bg-indigo-600 hover:bg-indigo-700 transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
                Next →
            </button>
        </div>

    </div>

    <script src="../js/IDEvsDE.js"></script>
</body>

</html>
